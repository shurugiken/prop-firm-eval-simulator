name: CI
on: [push, pull_request]
jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install "numpy>=1.24"
      - name: Run Monte-Carlo self-tests
        run: python eval_sim.py
